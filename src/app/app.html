<!-- Mobile toggle button (hidden on desktop) -->
<button 
  class="btn btn-dark d-md-none position-fixed top-0 start-0 m-3 z-3" 
  type="button" 
  (click)="toggleSidebar()"
  *ngIf="!isSidebarOpen && showSidebar">
  <i class="bi bi-list"></i>
</button>

<!-- Overlay for mobile when sidebar is open -->
<div 
  class="sidebar-overlay d-md-none" 
  *ngIf="isSidebarOpen && showSidebar" 
  (click)="closeSidebar()">
</div>

<div class="d-flex" id="app-wrapper">

  <!-- Sidebar - only shown when showSidebar is true -->
  <nav 
    *ngIf="showSidebar"
    id="sidebar" 
    class="bg-primary text-white vh-100 p-3 flex-shrink-0 shadow-lg"
    [class.show]="isSidebarOpen">
    <div class="d-flex flex-column h-100">

      <!-- Logo with icon -->
      <a class="navbar-brand fw-bold mb-4 text-center fs-4 d-flex align-items-center justify-content-center" href="#">
        <i class="bi bi-mortarboard-fill me-2"></i>
        <span>EduManager</span>
      </a>

      <!-- Navigation Menu -->
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/dashboard" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-speedometer2 me-2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/students" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-people me-2"></i> Students
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/students/add" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-person-plus me-2"></i> Add Student
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/classes" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-building me-2"></i> Manage Classes
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/attendance" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-card-checklist me-2"></i> Attendance
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/result" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-file-earmark-text me-2"></i> Results
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/exams" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-journal-bookmark-fill me-2"></i> Exams
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" 
             routerLink="/admin" 
             routerLinkActive="active" 
             [routerLinkActiveOptions]="{ exact: true }">
            <i class="bi bi-shield-lock me-2"></i> Admin
          </a>
        </li>
      </ul>

      <!-- User Profile / Logout -->
      <div class="mt-auto pt-3 border-top border-white border-opacity-25">
        <div class="d-flex align-items-center text-white mb-3">
          <i class="bi bi-person-circle fs-4 me-2"></i>
          <div>
            <div class="fw-semibold">{{ user?.name || 'Admin User' }}</div>
            <small class="text-white-50">{{ user?.email || 'admin@school.edu' }}</small>
          </div>
        </div>
        <a class="nav-link text-white px-0 py-2" (click)="logout()" role="button">
          <i class="bi bi-box-arrow-right me-2"></i> Logout
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <div id="main-content" class="flex-grow-1 p-4 bg-light" [class.full-width]="!showSidebar">
    <div class="container-fluid">
      <app-toast></app-toast>
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
