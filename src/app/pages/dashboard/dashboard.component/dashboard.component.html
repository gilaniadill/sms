<div class="container-fluid mt-4">
  <!-- Page Header (optional) -->
  <div class="d-flex align-items-center mb-4">
    <i class="bi bi-bar-chart-steps fs-2 me-3" style="color: #1e2b3a;"></i>
    <h4 class="fw-semibold mb-0" style="color: #1e2b3a;">Class Overview</h4>
  </div>

  <!-- Class Stats Cards -->
  <div class="row g-4 mb-5">
    <div class="col-md-3 col-sm-6" *ngFor="let cls of classStats">
      <div class="card h-100 border-0 shadow-sm class-card">
        <div class="card-body d-flex flex-column">
          <div class="d-flex align-items-center mb-3">
            <div class="class-icon me-3">
              <i class="bi bi-building fs-2" style="color: #1e2b3a;"></i>
            </div>
            <h5 class="card-title fw-semibold mb-0">Class {{ cls.className }}</h5>
          </div>
          <p class="card-text text-muted mb-3">
            Total Students
          </p>
          <div class="d-flex justify-content-between align-items-center mt-auto">
            <span class="student-count display-6 fw-bold" style="color: #1e2b3a;">{{ cls.studentCount }}</span>
            <button class="btn btn-sm btn-outline-primary" (click)="openClass(cls)">
              View <i class="bi bi-arrow-right ms-1"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chart Card -->
  <div class="card shadow-sm border-0">
    <div class="card-header bg-white py-3 d-flex align-items-center border-bottom border-2" style="border-bottom-color: #1e2b3a !important;">
      <i class="bi bi-pie-chart-fill me-2 fs-4" style="color: #1e2b3a;"></i>
      <h5 class="mb-0 fw-semibold" style="color: #1e2b3a;">Class Distribution</h5>
    </div>
    <div class="card-body">
      <canvas id="classChart" style="max-height: 400px;"></canvas>
    </div>
  </div>
</div>
