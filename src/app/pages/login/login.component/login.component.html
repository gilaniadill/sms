<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow-lg border-0 rounded-4" style="width:400px;">
    <div class="card-body p-5">
      <h4 class="text-center mb-4 fw-bold text-primary">Admin Login</h4>

      <!-- Email Input -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Email address</label>
        <input 
          type="email" 
          class="form-control form-control-lg" 
          placeholder="name@example.com" 
          [(ngModel)]="email"
        >
      </div>

      <!-- Password Input with Show/Hide -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <input 
            [type]="show ? 'text' : 'password'" 
            class="form-control form-control-lg" 
            placeholder="Enter password" 
            [(ngModel)]="password"
          >
          <button class="btn btn-outline-secondary" type="button" (click)="show = !show">
            <i class="bi" [ngClass]="show ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Login Button with Spinner -->
      <button class="btn btn-primary w-100 btn-lg mb-3" (click)="login()" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

      <!-- Forgot Password Link -->
      <!-- <div class="text-center">
        <a routerLink="/forgot-password" class="text-decoration-none">Forgot Password?</a>
      </div> -->
    </div>
  </div>
</div>
