<div class="container-fluid mt-4">
  <div class="card shadow-sm border-0">
    <!-- Card Header -->
    <div class="card-header bg-white py-3 d-flex align-items-center border-bottom border-2"
      style="border-bottom-color: #1e2b3a !important;">
      <i class="bi bi-person-plus-fill me-2 fs-4" style="color: #1e2b3a;"></i>
      <h5 class="mb-0 fw-semibold" style="color: #1e2b3a;">Add New Student</h5>
    </div>

    <div class="card-body">
      <form [formGroup]="studentForm" (ngSubmit)="submit()">
        <!-- Row 1: Admission No, First Name, Last Name, Father's Name -->
        <div class="row g-3 mb-3">
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-upc-scan me-1"></i> Admission No <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="admissionNo" placeholder="e.g. ADM001">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-person me-1"></i> First Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="firstName" placeholder="First name">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-person me-1"></i> Last Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="lastName" placeholder="Last name">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-semibold">
              <i class="bi bi-person-badge me-1"></i> Father's Name <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="fatherName" placeholder="Father's full name">
          </div>
        </div>

        <!-- Row 2: Class, Section, Date of Birth -->
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-building me-1"></i> Class <span class="text-danger">*</span>
            </label>
            <select class="form-select" formControlName="class" (change)="onClassChange($event)">
              <option value="">Select Class</option>
              <option *ngFor="let c of classes" [value]="c._id">
                {{ c.className }}
              </option>
            </select>

          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-layers me-1"></i> Section <span class="text-danger">*</span>
            </label>
            <select class="form-select" formControlName="section">
              <option value="">Select Section</option>
              <option *ngFor="let s of sections" [value]="s">{{ s }}</option>
            </select>

          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-calendar me-1"></i> Date of Birth <span class="text-danger">*</span>
            </label>
            <input type="date" class="form-control" formControlName="dateOfBirth">
          </div>
        </div>

        <!-- Row 3: CNIC, Phone, Gender (student_status?) -->
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-card-text me-1"></i> CNIC <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="cnic" placeholder="XXXXX-XXXXXXX-X">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-telephone me-1"></i> Phone
            </label>
            <input type="text" class="form-control" formControlName="phone" placeholder="03XX-XXXXXXX">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-gender-ambiguous me-1"></i> Student Status
            </label>
            <select class="form-select" formControlName="student_status">
              <option value="Regular">Regular</option>
              <option value="Private">Private</option>
              <option value="Other">Other</option>
            </select>
            <!-- <small class="text-muted">(Note: This field appears mislabeled – adjust as needed)</small> -->
          </div>
        </div>

        <!-- Row 4: Academic Year, Gender, Email -->
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-calendar2-week me-1"></i> Academic Year <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" formControlName="academicYear" placeholder="e.g. 2025">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-gender-ambiguous me-1"></i> Gender <span class="text-danger">*</span>
            </label>
            <select class="form-select" formControlName="gender">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-envelope me-1"></i> Email
            </label>
            <input type="email" class="form-control" formControlName="email" placeholder="student@example.com">
          </div>
        </div>

        <!-- Row 5: Address, Photo -->
        <div class="row g-3 mb-4">
          <div class="col-md-8">
            <label class="form-label fw-semibold">
              <i class="bi bi-house me-1"></i> Address
            </label>
            <input type="text" class="form-control" formControlName="address" placeholder="Full address">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">
              <i class="bi bi-image me-1"></i> Photo
            </label>
            <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*">
            <small class="text-muted">Optional</small>
          </div>
        </div>

        <!-- Form Actions -->
        <div class="d-flex gap-2">
          <button class="btn btn-success" type="submit" [disabled]="studentForm.invalid">
            <i class="bi bi-check-circle me-1"></i> Submit
          </button>
          <button class="btn btn-outline-secondary" type="button" routerLink="/students">
            <i class="bi bi-x-circle me-1"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
